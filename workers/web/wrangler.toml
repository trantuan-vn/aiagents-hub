main = ".open-next/worker.js"
name = "aiagents-hub-trading-sto"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
NEXT_PUBLIC_DEBUG = "true"
# Must match auth-worker TURNSTILE_SITE_KEY (Cloudflare Turnstile widget hostnames: aiagents-hub.vn + www)
NEXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADXOWPMRtW0XIcLk"
NEXT_PUBLIC_SMS_2FA_ENABLED = false

[limits]
cpu_ms = 300000

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
[[routes]]
pattern = "aiagents-hub.vn"
custom_domain = true